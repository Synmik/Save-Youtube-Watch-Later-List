<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Watch Later List</title>
  <style>
    * {
      box-sizing: border-box;
    }

    /* CSS Custom Properties - Light Theme */
    :root {
      --bg-primary: rgba(230, 230, 230, 0.95);
      --bg-secondary: rgba(230, 230, 230, 0.95);
      --bg-hover: #f8f9fa;
      --text-primary: #333333;
      --text-secondary: #666666;
      --text-muted: #999999;
      --text-link: #0066cc;
      --border-color: rgba(0, 0, 0, 0.1);
      --border-light: #eeeeee;
      --input-bg: #f0f0f0;
      --input-border: #dddddd;
      --input-focus-border: #007bff;
      --input-focus-shadow: rgba(0, 123, 255, 0.25);
      --thumbnail-bg: #f0f0f0;
      --scrollbar-track: #f1f1f1;
      --scrollbar-thumb: #c1c1c1;
      --scrollbar-thumb-hover: #a8a8a8;
      --status-loading-bg: #fff3cd;
      --status-loading-text: #856404;
      --status-loading-border: #ffc107;
      --status-success-bg: #d4edda;
      --status-success-text: #155724;
      --status-success-border: #28a745;
      --status-error-bg: #f8d7da;
      --status-error-text: #721c24;
      --status-error-border: #dc3545;
      --status-warning-bg: #fff3cd;
      --status-warning-text: #856404;
      --status-warning-border: #ffc107;
      --theme-toggle-hover: rgba(255, 255, 255, 0.2);
    }

    /* CSS Custom Properties - Dark Theme */
    body.dark-mode {
      --bg-primary: #2d2d2d; /*#1a1a1a */
      --bg-secondary: #2d2d2d;
      --bg-hover: #3a3a3a;
      --text-primary: #e0e0e0;
      --text-secondary: #b0b0b0;
      --text-muted: #888888;
      --text-link: #6d9bff;
      --border-color: #404040;
      --border-light: #404040;
      --input-bg: #3d3d3d;
      --input-border: #505050;
      --input-focus-border: #4d94ff;
      --input-focus-shadow: rgba(77, 148, 255, 0.25);
      --thumbnail-bg: #3d3d3d;
      --scrollbar-track: #2a2a2a;
      --scrollbar-thumb: #555555;
      --scrollbar-thumb-hover: #666666;
      --status-loading-bg: #5a522d;
      --status-loading-text: #f0f0e0;
      --status-loading-border: #ffc107;
      --status-success-bg: #2d5a3d;
      --status-success-text: #e0f0e0;
      --status-success-border: #28a745;
      --status-error-bg: #5a2d2d;
      --status-error-text: #f0e0e0;
      --status-error-border: #dc3545;
      --status-warning-bg: #5a522d;
      --status-warning-text: #f0f0e0;
      --status-warning-border: #ffc107;
      --theme-toggle-hover: rgba(0, 0, 0, 0.4);
    }

    body {
      width: 600px;
      height: 600px;
      min-height: 600px;
      display: grid;
      grid-template-rows: auto auto auto 1fr;
      padding: 0;
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
    }

    .header {
      background: var(--bg-primary);
      padding: 6px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
    }

    .header-content {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      margin-bottom: 4px;
    }

    .header h1 {
      margin: 0;
      font-size: 18px;
      color: var(--text-primary);
      flex: 1;
      text-align: center;
    }

    .video-count {
      text-align: center;
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .controls {
      display: flex;
      gap: 4px;
      margin-bottom: 5px;
    }

    .btn {
      padding: 10px 8px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 500;
      transition: all 0.2s ease;
      text-align: center;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      flex: 1;
    }

    .btn svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .btn-primary svg {
      fill: white;
    }

    .btn-secondary svg,
    .btn-danger svg {
      fill: white;
    }

    .btn-primary {
      background: #ff0000;
      color: white;
      font-weight: 700;
      flex-grow: 3;
    }

    .btn-primary:hover:not(:disabled) {
      background: #cc0000;
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: #6c757d;
      color: white;
    }

    .btn-secondary:hover:not(:disabled) {
      background: #545b62;
      transform: translateY(-1px);
    }

    .btn-danger {
      background: #dc3545;
      color: white;
    }

    .btn-danger:hover:not(:disabled) {
      background: #c82333;
      transform: translateY(-1px);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none !important;
    }

    .filters {
      background: var(--bg-secondary);
      padding: 6px;
      border-bottom: 1px solid var(--border-color);
    }

    .filter-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-bottom: 6px;
    }

    .filter-row:last-child {
      margin-bottom: 0;
    }

    .filter-controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .search-wrapper {
      position: relative;
    }

    .search-clear-btn {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      font-size: 18px;
      color: var(--text-muted);
      cursor: pointer;
      padding: 2px 6px;
      line-height: 1;
      display: none;
      transition: color 0.2s ease;
    }

    .search-clear-btn:hover {
      color: var(--text-primary);
    }

    .search-clear-btn.visible {
      display: block;
    }

    .form-control {
      width: 100%;
      padding: 8px 8px;
      background: var(--input-bg);
      color: var(--text-primary);
      border: 1px solid var(--input-border);
      border-radius: 4px;
      font-size: 14px;
      transition: border-color 0.2s ease;
    }

    .search-input {
      padding-right: 32px;
    }

    .form-control:focus {
      outline: none;
      border-color: var(--input-focus-border);
      box-shadow: 0 0 0 2px var(--input-focus-shadow);
    }

    .status {
      padding: 10px 5px;
      text-align: center;
      font-size: 14px;
      min-height: 5px;
      transition: all 0.3s ease;
    }

    .status-loading {
      background: var(--status-loading-bg);
      color: var(--status-loading-text);
      border-left: 4px solid var(--status-loading-border);
    }

    .status-success {
      background: var(--status-success-bg);
      color: var(--status-success-text);
      border-left: 4px solid var(--status-success-border);
    }

    .status-error {
      background: var(--status-error-bg);
      color: var(--status-error-text);
      border-left: 4px solid var(--status-error-border);
    }

    .status-warning {
      background: var(--status-warning-bg);
      color: var(--status-warning-text);
      border-left: 4px solid var(--status-warning-border);
    }

    .content {
      background: var(--bg-secondary);
      /* max-height: 380px; */
      overflow-y: auto;
    }

    #savedList {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .video-item {
      padding: 10px;
      border-bottom: 1px solid var(--border-light);
      transition: background-color 0.2s ease;
      display: flex;
      gap: 2px;
      align-items: flex-start;
    }

    .video-item:hover {
      background-color: var(--bg-hover);
    }

    .video-item:last-child {
      border-bottom: none;
    }

    .video-thumbnail {
      flex-shrink: 0;
      width: 110px;
      height: 75px;
      border-radius: 3px;
      overflow: hidden;
      background: var(--thumbnail-bg);
    }

    .video-thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .video-info {
      flex: 1;
      min-width: 0;
    }

    .video-title {
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 10px;
      line-height: 1.4;
      display: -webkit-box;
      line-clamp: 2;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      text-decoration: none;
      font-size: 13px;
    }

    .video-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: var(--text-secondary);
      flex-wrap: wrap;
      gap: 4px;
    }

    .video-channel {
      font-weight: 500;
      font-size: 14px;
      color: var(--text-link);
      max-width: 60%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .video-date {
      color: var(--text-muted);
      white-space: nowrap;
    }

    .no-videos {
      padding: 40px 16px;
      text-align: center;
      color: var(--text-secondary);
      font-style: italic;
    }
    
    .no-videos svg {
      display: block;
      margin: 0 auto 16px;
      width: 120px;
      height: 120px;
    }
    
    .no-videos-text {
      display: block;
      margin-top: 8px;
      font-size: 14px;
    }

    .video-duration {
      background: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 2px 4px;
      border-radius: 2px;
      font-size: 10px;
      position: absolute;
      bottom: -4px;
      right: 10px;
    }

    .thumbnail-wrapper {
      position: relative;
      width: 120px;
      height: 68px;
    }

    .loading-spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid var(--scrollbar-track);
      border-top: 2px solid var(--text-primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .btn-primary:disabled .loading-spinner {
      border-top-color: var(--text-muted);
    }

    /* Scrollbar styling */
    .content::-webkit-scrollbar {
      width: 15px;
    }

    .content::-webkit-scrollbar-track {
      background: var(--scrollbar-track);
      border-radius: 4px;
    }

    .content::-webkit-scrollbar-thumb {
      background: var(--scrollbar-thumb);
      border-radius: 4px;
      border: 2px solid var(--scrollbar-track);
    }

    .content::-webkit-scrollbar-thumb:hover {
      background: var(--scrollbar-thumb-hover);
    }

    .theme-toggle-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      margin-left: auto;
      border-radius: 4px;
      transition: background-color 0.2s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .theme-toggle-btn:hover {
      background-color: var(--theme-toggle-hover);
    }

    .theme-icon {
      font-size: 16px;
      line-height: 1;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-content">
      <h1>YouTube Watch Later List</h1>
      <button id="themeToggle" class="theme-toggle-btn" aria-label="Toggle theme" aria-pressed="false">
        <span class="theme-icon">🌙</span>
      </button>
    </div>
    <div id="videoCount" class="video-count">Loading...</div>
    
    <div class="controls">
      <button id="saveBtn" class="btn btn-primary">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z"/></svg>
        <span class="btn-text">Save Videos</span>
      </button>
      <button id="clearBtn" class="btn btn-danger">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
        Clear All
      </button>
      <button id="importBtn" class="btn btn-secondary">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M9 16h6v-6h4l-7-7-7 7h4zm-4 8h14v-2H5z"/></svg>
        Import
      </button>
      <button id="exportBtn" class="btn btn-secondary">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
        Export
      </button>
    </div>
  </div>


  <input type="file" id="jsonFileInput" accept=".json" style="display: none;" />

  <div class="filters">
    <div class="filter-row">
      <div class="search-wrapper">
        <input
          type="text"
          id="searchInput"
          class="form-control search-input"
          placeholder="Search videos by title or channel..."
        >
        <button id="clearSearchBtn" class="search-clear-btn" aria-label="Clear search">×</button>
      </div>
    </div>
    <div class="filter-row">
      <div class="filter-controls">
        <select id="sortSelect" class="form-control">
          <option value="default">Sort by: Default</option>
          <option value="title">Sort by: Title</option>
          <option value="channel">Sort by: Channel</option>
          <option value="date-new">Sort by: Newest</option>
          <option value="date-old">Sort by: Oldest</option>
        </select>
        <select id="filterSelect" class="form-control">
          <option value="all">All Videos</option>
          <option value="week">Last Week</option>
          <option value="month">Last Month</option>
          <option value="year">Last Year</option>
        </select>
      </div>
    </div>
  </div>

  <div id="status" class="status"></div>
  
  <div class="content">
    <ul id="savedList"></ul>
  </div>

  <script src="popup.js"></script>
</body>
</html>
